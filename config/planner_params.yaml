/**:
  ros__parameters:
    # ROS graph interface. Relative topic names remain identical in the root namespace
    # and allow the node to be placed under a robot namespace.
    topics.odom: "lidar_location_now"
    topics.global_path: "pct_path_copy"
    topics.point_cloud: "lidar_points_copy"
    topics.filtered_point_cloud: "lidar_points_filtered_copy"
    topics.unfinished_global_path: "dog_output_global_path_unfinished_copy"
    topics.local_path: "dog_output_local_path_copy"
    topics.occupancy_grid: "dog_2Dmap_occupancy_copy"
    topics.goal_reached_legacy: "if_reach_the_goal_copy"
    topics.goal_reached: "goal_reached_copy"
    planning_frame: "local_map_lidar_init_xyz"

    # /lidar_location_now is published reliably by the self-SLAM localization bridge.
    odometry_use_best_effort_qos: false
    pct_path_match_nav2_qos: true

    debug: false
    debug.optimizer_logging: false

    # Global-path progress and replanning.
    global_path_update_interval_s: 1.0
    global_path.skip_duplicate_updates: true
    if_test_pct_path_update_tolerance: 0.01
    global_path.progress_search_margin_m: 1.0
    global_path.initial_search_length_m: 5.0
    global_path.reacquire_distance_m: 2.0
    planning.replan_on_change_only: true
    planning.remaining_path_trigger_m: 4.0
    goal_threshold: 0.7
    pose_change_thresh: 0.05
    obs_change_thresh: 0.1
    replan_freq: 10.0

    # Local planning horizon and B-spline constraints.
    local_path_max_m: 7.0
    local_path_min_m: 2.0
    planning.horizon_step_m: 1.0
    control_point_interval: 0.3
    max_vel: 1.0
    max_acc: 1.5
    max_jerk: 5.0
    max_rebound_retries: 3

    # Empty-corridor fast path. The clearance is derived from the robot footprint.
    enable_direct_follow_when_corridor_clear: true
    direct_follow_require_lidar: true
    corridor_dense_step_m: 0.1
    direct_path.smoothing_enabled: true
    direct_path.smoothing_iterations: 2

    # Robot footprint and rolling occupancy map.
    robot_footprint.length_m: 0.70
    robot_footprint.width_m: 0.40
    robot_footprint.safety_margin_m: 0.05
    robot_footprint.self_filter_inset_m: 0.02
    grid_map_size_m: 20.0
    grid_map_resolution: 0.1
    grid_inflate_radius: 0.46
    astar_pool_size: 100
    occupancy_publish_freq: 2.0

    # Point-cloud filtering and TF policy.
    cloud_tf_timeout_ms: 100
    cloud_tf_allow_latest_fallback: true
    cloud_tf_fallback_max_age_ms: 100
    cloud_valid_x_abs_max: 10.0
    cloud_valid_y_abs_max: 10.0
    cloud_valid_z_min: 0.01
    cloud_valid_z_max: 1.0
    cloud_max_input_points: 1000000
    safety.minimum_point_cloud_points: 10

    # Fail-safe behaviour. A stale obstacle stream never enables blind direct following.
    safety.odometry_timeout_s: 0.5
    safety.point_cloud_timeout_s: 0.5
    safety.max_odometry_message_age_s: 0.5
    safety.max_point_cloud_message_age_s: 0.5
    safety.max_future_stamp_tolerance_s: 0.1
    safety.max_cloud_odometry_skew_s: 0.1
    safety.path_reuse_max_distance_m: 0.5
    safety.require_fresh_obstacle_data: true
    safety.failure_stop_timeout_s: 0.5
    max_consecutive_failures_before_cooldown: 3
    replan_failure_cooldown_ms: 200

    # Safer default: an absent/invalid task is not reported as completed.
    compatibility.legacy_no_path_is_reached: false
